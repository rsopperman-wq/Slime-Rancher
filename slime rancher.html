<!DOCTYPE html>
<html lang="en-us">

<head>
    <base href="https://cdn.jsdelivr.net/gh/web-ports/slime-ranchers@main/">
    <meta charset="utf-8">
    <title>Slime Rancher Decompiled v0.2.1</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/1.6.0/jquery.min.js"></script>
    <script src="TemplateData/UnityProgress.js"></script>
    <script src="Build/UnityLoader.js"></script>
    <script src="mobile-controls.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        #gameContainer { background: #000; margin: 0 auto; }
        .webgl-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; }
        #loading-text { -webkit-text-stroke-width: 2px; -webkit-text-stroke-color: black; color: white; font-size: 48px; font-family: cursive; text-align: center; margin-top: 20px; position: relative; z-index: 10; }
    </style>
</head>

<body>
    <div class="webgl-content">
        <div class="bg">
            <img class="bg" src="TemplateData/loading_bg.png" style="width: 100%; height: 100%; padding: 0px; margin: 0px; border: 0px; position: absolute; top: 0; left: 0;">
        </div>
        <div id="loading-text">LOADING...</div>
        <div id="gameContainer" style="width: 960px; height: 600px"></div>
    </div>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-L7856P3VNT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-L7856P3VNT');
    </script>

    <script>
        const ogxhr = window.XMLHttpRequest;
        function xhrfunc() {
            const xhr = new ogxhr();
            const open = xhr.open;
            xhr.open = function(method, url, ...rest) {
                if (url.includes("version.txt")) return open.call(this, method, "updates/version.txt", ...rest);
                if (url.includes("slime.txt")) return open.call(this, method, "updates/slime.txt", ...rest);
                return open.call(this, method, url, ...rest);
            };
            return xhr;
        }
        window.XMLHttpRequest = xhrfunc;

        var loadingText = document.querySelector("#loading-text");
        let loadedBytes = 0;

        async function fetchWithProgress(url) {
            const response = await fetch(url);
            const reader = response.body.getReader();
            let chunks = [];
            let received = 0;
            while (true) {
                const {done, value} = await reader.read();
                if (done) break;
                received += value.length;
                loadedBytes += value.length;
                chunks.push(value);
                loadingText.innerHTML = `LOADING... ${(loadedBytes / 1048576).toFixed(2)} MB / 92.01 MB`;
            }
            let fullBuffer = new Uint8Array(received);
            let offset = 0;
            for (let chunk of chunks) { fullBuffer.set(chunk, offset); offset += chunk.length; }
            return fullBuffer.buffer;
        }

        async function mergeFiles(file, start, end) {
            let parts = [];
            for (let i = start; i <= end; i++) parts.push(file + ".part" + i);
            const buffers = await Promise.all(parts.map(part => fetchWithProgress(part)));
            return URL.createObjectURL(new Blob(buffers));
        }

        function resizeUnityContainer() {
            var container = document.getElementById("gameContainer");
            var canvas = container.querySelector("canvas");
            container.style.width = window.innerWidth + "px";
            container.style.height = window.innerHeight + "px";
            if (canvas) {
                canvas.style.width = window.innerWidth + "px";
                canvas.style.height = window.innerHeight + "px";
            }
        }

        (async () => {
            const [dataUrl, wasmUrl] = await Promise.all([
                mergeFiles("Build/slimeBUILDS.data", 1, 4),
                mergeFiles("Build/slimeBUILDS.wasm", 1, 2)
            ]);

            const json = {
                "companyName": "Snubs",
                "productName": "Slime Rancher Prototype",
                "dataUrl": dataUrl,
                "wasmCodeUrl": wasmUrl,
                "wasmFrameworkUrl": "slimeBUILDS.framework.js",
                "TOTAL_MEMORY": 536870912,
                "graphicsAPI": ["WebGL 2.0", "WebGL 1.0"],
                "webglContextAttributes": { "preserveDrawingBuffer": false },
                "splashScreenStyle": "Dark"
            };

            window.addEventListener("resize", resizeUnityContainer);

            UnityLoader.instantiate("gameContainer", json, {
                Module: {
                    onRuntimeInitialized: function() {
                        resizeUnityContainer();
                        document.querySelector("#loading-text").remove();
                    },
                },
            });

            // MOUSE LOCK FIX
            document.addEventListener('mousedown', function () {
                var canvas = document.querySelector("#gameContainer canvas");
                if (canvas) {
                    canvas.requestPointerLock = canvas.requestPointerLock || canvas.mozRequestPointerLock || canvas.webkitRequestPointerLock;
                    canvas.requestPointerLock();
                }
            });
        })();
    </script>
</body>
</html>
